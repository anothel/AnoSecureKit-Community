# SPDX-License-Identifier: MPL-2.0
name: AnoSecureKit CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          - os: ubuntu-latest
            compiler: gcc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Install Windows dependencies
        if: matrix.compiler == 'msvc'
        run: vcpkg install openssl:x64-windows

      - name: Cache GoogleTest
        uses: actions/cache@v6
        with:
          path: build/_deps/googletest-src
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      # Linux uses runner packages and Windows uses vcpkg; add explicit OpenSSL 3.5 coverage later if needed.
      - name: Configure CMake (GCC)
        if: matrix.compiler == 'gcc'
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DANOSECUREKIT_BUILD_TESTS=ON -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Configure CMake (Clang)
        if: matrix.compiler == 'clang'
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DANOSECUREKIT_BUILD_TESTS=ON -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Configure CMake (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -S . -B build -DANOSECUREKIT_BUILD_TESTS=ON
          -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DANOSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build and test
        run: cmake --build build --config ${{ matrix.build_type }} --target check

      - name: Package check
        run: cmake --build build --config ${{ matrix.build_type }} --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anosecurekit-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-packages
          path: |
            build/package-check/artifacts/*.zip
            build/package-check/artifacts/*.tar.gz

  install-only:
    name: ubuntu-latest gcc Release install-only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DANOSECUREKIT_BUILD_TESTS=OFF
          -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anosecurekit-ubuntu-gcc-release-install-only-packages
          path: |
            build/package-check/artifacts/*.zip
            build/package-check/artifacts/*.tar.gz

      - name: Verify package files
        run: |
          test -f "${{ github.workspace }}/build/package-check/install/bin/anosecurekit"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitConfig.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitConfigVersion.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitTargets.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitTargets-release.cmake"

  linux-static:
    name: ubuntu-latest gcc Release static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Cache GoogleTest
        uses: actions/cache@v6
        with:
          path: build/_deps/googletest-src
          key: ${{ runner.os }}-gcc-Release-static-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-gcc-Release-static-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DANOSECUREKIT_BUILD_TESTS=ON
          -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anosecurekit-ubuntu-gcc-release-static-packages
          path: |
            build/package-check/artifacts/*.zip
            build/package-check/artifacts/*.tar.gz

      - name: Verify static package files
        run: |
          test -f "${{ github.workspace }}/build/package-check/install/bin/anosecurekit"
          test -f "${{ github.workspace }}/build/package-check/install/lib/libanosecurekit.a"
          test ! -f "${{ github.workspace }}/build/package-check/install/lib/libanosecurekit.so"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitConfig.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitConfigVersion.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitTargets.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitTargets-release.cmake"

  windows-shared:
    name: windows-latest msvc Release shared
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Windows dependencies
        run: vcpkg install openssl:x64-windows

      - name: Cache GoogleTest
        uses: actions/cache@v6
        with:
          path: build/_deps/googletest-src
          key: ${{ runner.os }}-msvc-Release-shared-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-msvc-Release-shared-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DBUILD_SHARED_LIBS=ON
          -DANOSECUREKIT_BUILD_TESTS=ON
          -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DANOSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anosecurekit-windows-msvc-release-shared-packages
          path: |
            build/package-check/artifacts/*.zip
            build/package-check/artifacts/*.tar.gz

      - name: Verify shared package files
        shell: pwsh
        run: |
          $files = @(
            "${{ github.workspace }}/build/package-check/install/bin/anosecurekit.exe",
            "${{ github.workspace }}/build/package-check/install/bin/anosecurekit.dll",
            "${{ github.workspace }}/build/package-check/install/lib/anosecurekit.lib",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitConfig.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitConfigVersion.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitTargets.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/anosecurekit/anosecurekitTargets-release.cmake"
          )
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing $file"
            }
          }

  linux-sanitizers:
    name: ubuntu-latest clang Debug sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libssl-dev ninja-build

      - name: Cache GoogleTest
        uses: actions/cache@v6
        with:
          path: build/_deps/googletest-src
          key: ${{ runner.os }}-clang-Debug-sanitizer-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-clang-Debug-sanitizer-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DANOSECUREKIT_BUILD_TESTS=ON
          -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build and test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: cmake --build build --config Debug --target check

  macos-package:
    name: macos-latest appleclang Release package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install macOS dependencies
        run: brew install ninja openssl@3

      - name: Cache GoogleTest
        uses: actions/cache@v6
        with:
          path: build/_deps/googletest-src
          key: ${{ runner.os }}-appleclang-Release-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-appleclang-Release-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DANOSECUREKIT_BUILD_TESTS=ON
          -DANOSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anosecurekit-macos-clang-release-packages
          path: |
            build/package-check/artifacts/*.zip
            build/package-check/artifacts/*.tar.gz

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, install-only, linux-static, windows-shared, linux-sanitizers, macos-package]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout release source
        uses: actions/checkout@v7

      - name: Prepare canonical release notes
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          notes_file="$RUNNER_TEMP/anosecurekit-release-notes.md"
          cmake \
            -DANOSECUREKIT_RELEASE_NOTES_FILE="$GITHUB_WORKSPACE/docs/RELEASE_NOTES.md" \
            -DANOSECUREKIT_RELEASE_VERSION="$tag_version" \
            -DANOSECUREKIT_RELEASE_NOTES_OUTPUT="$notes_file" \
            -P "$GITHUB_WORKSPACE/cmake/extract_release_notes.cmake"
          printf 'ANOSECUREKIT_RELEASE_NOTES_FILE=%s\n' "$notes_file" >> "$GITHUB_ENV"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s globstar nullglob
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag is not SemVer: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          declare -A copied_source
          expected_source_zip="anosecurekit-${tag_version}-source.zip"
          expected_source_tgz="anosecurekit-${tag_version}-source.tar.gz"
          expected_binary_artifacts=(
            "anosecurekit-ubuntu-latest-gcc-Release-packages"
            "anosecurekit-ubuntu-latest-clang-Release-packages"
            "anosecurekit-ubuntu-latest-gcc-Debug-packages"
            "anosecurekit-windows-latest-msvc-Release-packages"
            "anosecurekit-ubuntu-gcc-release-install-only-packages"
            "anosecurekit-ubuntu-gcc-release-static-packages"
            "anosecurekit-windows-msvc-release-shared-packages"
            "anosecurekit-macos-clang-release-packages"
          )
          expected_binary_suffixes=(".zip" ".tar.gz")
          for artifact in release-artifacts/*/anosecurekit-"$tag_version"-*.zip release-artifacts/*/anosecurekit-"$tag_version"-*.tar.gz; do
            if [[ ! -f "$artifact" ]]; then
              continue
            fi

            base="$(basename "$artifact")"
            artifact_name="$(basename "$(dirname "$artifact")")"
            if [[ "$base" != anosecurekit-"$tag_version"-* ]]; then
              echo "Release artifact version does not match tag ${GITHUB_REF_NAME}: $base" >&2
              exit 1
            fi

            if [[ "$base" == *-source.* ]]; then
              if [[ -z "${copied_source[$base]+x}" ]]; then
                cp "$artifact" "dist/$base"
                copied_source[$base]=1
              fi
              continue
            fi

            cp "$artifact" "dist/${artifact_name}-${base}"
          done

          if [[ ! -f "dist/$expected_source_zip" ]]; then
            echo "No source ZIP package artifact found: $expected_source_zip" >&2
            exit 1
          fi
          if [[ ! -f "dist/$expected_source_tgz" ]]; then
            echo "No source TGZ package artifact found: $expected_source_tgz" >&2
            exit 1
          fi
          for expected_binary_artifact in "${expected_binary_artifacts[@]}"; do
            for expected_binary_suffix in "${expected_binary_suffixes[@]}"; do
              expected_binary_matches=(dist/"${expected_binary_artifact}-anosecurekit-${tag_version}-"*"$expected_binary_suffix")
              if [[ "${#expected_binary_matches[@]}" -eq 0 ]]; then
                echo "No binary $expected_binary_suffix package artifact found for $expected_binary_artifact" >&2
                exit 1
              fi
            done
          done

          find dist -maxdepth 1 -type f -print | sort

      - name: Generate release SBOM
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          sbom_name="anosecurekit-${tag_version}-release.spdx.json"
          python3 - "$tag_version" "$sbom_name" <<'PY'
          import datetime
          import hashlib
          import json
          import pathlib
          import re
          import sys

          tag_version = sys.argv[1]
          sbom_name = sys.argv[2]
          dist = pathlib.Path("dist")
          assets = sorted(
              path for path in dist.iterdir()
              if path.is_file() and path.name not in {sbom_name, "SHA256SUMS.txt"}
          )
          packages = []
          for asset in assets:
              spdx_id = re.sub(r"[^A-Za-z0-9.-]", "-", asset.name)
              packages.append({
                  "name": asset.name,
                  "SPDXID": f"SPDXRef-Package-{spdx_id}",
                  "downloadLocation": "NOASSERTION",
                  "filesAnalyzed": False,
                  "checksums": [{
                      "algorithm": "SHA256",
                      "checksumValue": hashlib.sha256(asset.read_bytes()).hexdigest(),
                  }],
                  "licenseConcluded": "NOASSERTION",
                  "licenseDeclared": "NOASSERTION",
                  "copyrightText": "NOASSERTION",
              })
          document = {
              "spdxVersion": "SPDX-2.3",
              "dataLicense": "CC0-1.0",
              "SPDXID": "SPDXRef-DOCUMENT",
              "name": f"anosecurekit {tag_version} release assets",
              "documentNamespace": f"https://github.com/anothel/AnoSecureKit-Community/releases/tag/v{tag_version}/sbom",
              "creationInfo": {
                  "created": datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
                  "creators": ["Tool: AnoSecureKit release workflow"],
              },
              "packages": packages,
          }
          (dist / sbom_name).write_text(json.dumps(document, indent=2) + "\n", encoding="utf-8")
          PY
          (cd dist && rm -f SHA256SUMS.txt && sha256sum * > SHA256SUMS.txt)

      - name: Attest release assets
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="AnoSecureKit Community ${tag}"
          notes_file="${ANOSECUREKIT_RELEASE_NOTES_FILE:?}"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --verify-tag --title "$title" --notes-file "$notes_file"
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" dist/* --clobber
